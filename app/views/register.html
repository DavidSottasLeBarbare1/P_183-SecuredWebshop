<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Secure Shop - Inscription</title>
    <link rel="stylesheet" href="/css/main.css" />
  </head>
  <body>
    <div id="topbar"></div>

    <main>
      <section class="hero">
        <div class="container">
          <div class="profile-card" style="margin-top: 0; max-width: 500px">
            <h1 style="text-align: center">Inscription</h1>

            <form id="register-form">
            <div id="error-message" style="color: red; display: none;"></div>
              <div class="form-group">  
                <label for="username">Nom d'utilisateur</label>
                <input
                  type="text"
                  id="username"
                  name="username"
                  placeholder="Pseudo"
                  required
                />
              </div>

              <div class="form-group">
                <label for="email">Adresse Email</label>
                <input
                  type="email"
                  id="email"
                  name="email"
                  placeholder="exemple@mail.com"
                  required
                  style="
                    width: 100%;
                    padding: 0.6rem 0.8rem;
                    border: 1px solid #d1d5db;
                    border-radius: 8px;
                  "
                />
              </div>

              <div class="form-group">
                <label for="password">Mot de passe</label>
                <input
                  type="password"
                  id="password"
                  name="password"
                  required
                  style="
                    width: 100%;
                    padding: 0.6rem 0.8rem;
                    border: 1px solid #d1d5db;
                    border-radius: 8px;
                  "
                />
              </div>

              <hr />

              <div class="form-group">
                <label for="profile_photo">Photo de profil</label>
                <input
                  type="file"
                  id="profile_photo"
                  name="profile_photo"
                  accept="image/*"
                  required
                />
              </div>

              <hr />

              <label>Adresse</label>
              <div class="form-group" style="margin-top: 0.5rem">
                <input
                  type="text"
                  name="street"
                  placeholder="Rue et numéro"
                  required
                />
              </div>

              <div
                style="display: grid; grid-template-columns: 1fr 2fr; gap: 1rem"
              >
                <div class="form-group">
                  <input type="text" name="zip" placeholder="NPA" required />
                </div>
                <div class="form-group">
                  <input type="text" name="city" placeholder="Ville" required />
                </div>
              </div>

              <button type="submit" style="width: 100%; margin-top: 1rem">
                Créer mon compte
              </button>
            </form>

            <p
              style="
                margin-top: 1.5rem;
                text-align: center;
                color: var(--muted);
                font-size: 0.9rem;
              "
            >
              Déjà un compte ?
              <a
                href="/login"
                style="
                  color: var(--primary);
                  text-decoration: none;
                  font-weight: 600;
                "
                >Se connecter</a
              >
            </p>
          </div>
        </div>
      </section>
    </main>

    <footer id="contact" class="footer">
      <div class="container">
        <p>Projet pedagogique - ETML 183</p>
      </div>
    </footer>

    <script src="/js/nav.js"></script>
  </body>
</html>
<script>
const form = document.getElementById('register-form');
const errorDiv = document.getElementById('error-message');

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  
  const formData = new FormData(form);

  try {
    const response = await fetch('/api/auth/register', {
      method: 'POST',
      body: formData
    });

    const data = await response.json();

    if (!response.ok) {
      errorDiv.innerText = data.message;
      errorDiv.style.display = 'block';
    } else {
      window.location.href = '/login';
    }
  } catch (err) {
    errorDiv.innerText = "Une erreur de connexion est survenue.";
    errorDiv.style.display = 'block';
  }
});
</script>

<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Secure Shop - Inscription</title>
    <link rel="stylesheet" href="/css/main.css" />
  </head>
  <body>
    <div id="topbar"></div>

    <main>
      <section class="hero">
        <div class="container">
          <div class="profile-card" style="margin-top: 0; max-width: 500px">
            <h1 style="text-align: center">Inscription</h1>

            <form id="register-form">
              <div id="error-message" style="color: red; display: none"></div>
              <div class="form-group">
                <label for="username">Nom d'utilisateur</label>
                <input
                  type="text"
                  id="username"
                  name="username"
                  placeholder="Pseudo"
                  required
                />
              </div>

              <div class="form-group">
                <label for="email">Adresse Email</label>
                <input
                  type="email"
                  id="email"
                  name="email"
                  placeholder="exemple@mail.com"
                  required
                  style="
                    width: 100%;
                    padding: 0.6rem 0.8rem;
                    border: 1px solid #d1d5db;
                    border-radius: 8px;
                  "
                />
              </div>

              <div class="form-group">
                <label for="password">Mot de passe</label>
                <input
                  type="password"
                  id="password"
                  name="password"
                  required
                  style="
                    width: 100%;
                    padding: 0.6rem 0.8rem;
                    border: 1px solid #d1d5db;
                    border-radius: 8px;
                  "
                />
              </div>
              <div style="display: flex; gap: 4px; margin-top: 6px">
                <div class="strength-segment" id="segment1"></div>
                <div class="strength-segment" id="segment2"></div>
                <div class="strength-segment" id="segment3"></div>
                <div class="strength-segment" id="segment4"></div>
              </div>
              <div
                id="strength-label"
                style="
                  font-size: 12px;
                  font-weight: 500;
                  margin-top: 4px;
                  color: #9ca3af;
                "
              >
                Entrez un mot de passe
              </div>
              <ul
                id="req-list"
                style="margin: 6px 0 0; padding: 0; list-style: none"
              >
                <li id="length" class="req-item">
                  <span class="dot"></span>12 caractères minimum
                </li>
                <li id="uppercase" class="req-item">
                  <span class="dot"></span>1 majuscule
                </li>
                <li id="number" class="req-item">
                  <span class="dot"></span>1 chiffre
                </li>
                <li id="special" class="req-item">
                  <span class="dot"></span>1 caractère spécial (@$!%*?&amp;)
                </li>
              </ul>
              <hr />

              <div class="form-group">
                <label for="profile_photo">Photo de profil</label>
                <input
                  type="file"
                  id="profile_photo"
                  name="profile_photo"
                  accept="image/*"
                  required
                />
              </div>

              <hr />

              <label>Adresse</label>
              <div class="form-group" style="margin-top: 0.5rem">
                <input
                  type="text"
                  name="street"
                  placeholder="Rue et numéro"
                  required
                />
              </div>

              <div
                style="display: grid; grid-template-columns: 1fr 2fr; gap: 1rem"
              >
                <div class="form-group">
                  <input type="text" name="zip" placeholder="NPA" required />
                </div>
                <div class="form-group">
                  <input type="text" name="city" placeholder="Ville" required />
                </div>
              </div>

              <button type="submit" style="width: 100%; margin-top: 1rem">
                Créer mon compte
              </button>
            </form>

            <p
              style="
                margin-top: 1.5rem;
                text-align: center;
                color: var(--muted);
                font-size: 0.9rem;
              "
            >
              Déjà un compte ?
              <a
                href="/login"
                style="
                  color: var(--primary);
                  text-decoration: none;
                  font-weight: 600;
                "
                >Se connecter</a
              >
            </p>
          </div>
        </div>
      </section>
    </main>

    <footer id="contact" class="footer">
      <div class="container">
        <p>Projet pedagogique - ETML 183</p>
      </div>
    </footer>

    <script src="/js/nav.js"></script>
  </body>
</html>
<script src="/js/nav.js"></script>
<script>
const form = document.getElementById('register-form');
const errorDiv = document.getElementById('error-message');
const passwordInput = document.getElementById('password');
const segments = [document.getElementById('segment1'), document.getElementById('segment2'), document.getElementById('segment3'), document.getElementById('segment4')];
const label = document.getElementById('strength-label');
const requirements = {
  length: document.getElementById('length'),
  uppercase: document.getElementById('uppercase'),
  number: document.getElementById('number'),
  special: document.getElementById('special')
};

passwordInput.addEventListener('input', () => {
  const value = passwordInput.value;
  const checks = {
    length: value.length >= 12,
    uppercase: /[A-Z]/.test(value),
    number: /\d/.test(value),
    special: /[@$!%*?&]/.test(value)
  };

  Object.entries(checks).forEach(([key, state]) => {
    requirements[key].classList.toggle('ok', state);
  });

  const score = Object.values(checks).filter(Boolean).length;
  const levels = [
    { class: 'weak',   color: '#ef4444', text: 'Très faible' },
    { class: 'weak',   color: '#ef4444', text: 'Faible' },
    { class: 'medium', color: '#f59e0b', text: 'Moyen' },
    { class: 'medium', color: '#f59e0b', text: 'Bon' },
    { class: 'strong', color: '#22c55e', text: 'Fort' }
  ];

  if (!value.length) {
    segments.forEach(s => s.className = 'strength-segment');
    label.textContent = 'Entrez un mot de passe';
    label.style.color = '#9ca3af';
    return;
  }

  const lvl = levels[score];
  segments.forEach((s, i) => {
    s.className = 'strength-segment' + (i < score ? ' ' + lvl.class : '');
  });
  label.textContent = lvl.text;
  label.style.color = lvl.color;
});

form.addEventListener('submit', async (e) => {
  e.preventDefault();

  errorDiv.style.display = 'none';
  const formData = new FormData(form);

  try {
    const response = await fetch('/api/auth/register', {
      method: 'POST',
      body: formData
    });

    const data = await response.json();

    if (response.ok) {
      window.location.href = '/login';
    } else {
      errorDiv.innerText = data.error || data.message || "Une erreur est survenue.";
      errorDiv.style.display = 'block';
    }
  } catch (err) {
    errorDiv.innerText = "Une erreur de connexion est survenue.";
    errorDiv.style.display = 'block';
  }
});
</script>

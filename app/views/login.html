<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Shop - Connexion</title>
    <link rel="stylesheet" href="/css/main.css">
</head>
<body>
    <div id="topbar"></div>

    <main>
        <section class="hero">
            <div class="container">
                <div class="profile-card" style="margin-top: 0;">
                    <h1>Connexion</h1>
                    <div id="error-message" style="color: red; display: none;"></div>
                    <form id="login-form">
                        <div class="form-group">
                            <label for="email">Email</label>
                            <input type="email" id="email" name="email" placeholder="Votre email" required>
                        </div>
                        <div class="form-group">
                            <label for="password">Mot de passe</label>
                            <input type="password" id="password" name="password" placeholder="Votre mot de passe" required 
                                   style="width: 100%; padding: 0.6rem 0.8rem; border: 1px solid #d1d5db; border-radius: 8px;">
                        </div>
                        <button type="submit" style="width: 100%; margin-top: 1rem;">Se connecter</button>
                    </form>
                    <p style="margin-top: 1.5rem; text-align: center; color: var(--muted); font-size: 0.9rem;">
                        Pas encore de compte ? <a href="/register" style="color: var(--primary); text-decoration: none; font-weight: 600;">S'inscrire</a>
                    </p>
                </div>
            </div>
        </section>
    </main>

    <footer id="contact" class="footer">
        <div class="container">
            <p>Projet pedagogique - ETML 183</p>
        </div>
    </footer>

    <script src="/js/nav.js"></script>
    <script>
        const form = document.getElementById('login-form');
        const errorDiv = document.getElementById('error-message');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const data = {
                email: form.email.value,
                password: form.password.value
            };

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (!response.ok) {
                    errorDiv.innerText = result.error;
                    errorDiv.style.display = 'block';
                } else {
                    window.location.href = '/';
                }
            } catch (err) {
                errorDiv.innerText = "Une erreur de connexion est survenue.";
                errorDiv.style.display = 'block';
            }
        });
    </script>
</body>
</html>
